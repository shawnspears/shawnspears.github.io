<!--
1. How was it to wireframe and create an HTML page with a pair?
	I initially thought that the experience was going to be a difficult process to collaborate on, but I was definitely wrong. We were both utilizing Balsamiq, which I believe set the foundation for an effective collaborative environment. We also had very similar ideas with respect to which basic elements to incorporate into the wireframe, so that also made the design process a good experience.

2. Did you find wireframing to be helpful to your development process?
	It was definitely helpful! I had only created a wireframe once previously as part of a introduction workshop to UX/UI, and going through the process again was constructive to my understanding of how it benefits the development process. It is essentially akin to the rough draft of an academic paper, allowing you to brainstorm what the end result might look like before implementing it into a final product (which saves you a lot of effort). I also liked the fact that a wireframe was very easy to adapt and change as necessary.

3. What did you and your pair decide made a good wireframe?
	First and foremost, we decided that a simple wireframe would be most effective as it would allow us to more easily adapt to our own blogs. We decided that we would mainly focus on the layout aspect of the wireframe so that it could easily be transated into an HTML document with semantic elements.

4. What new semantic elements did you learn about (if any) ?
	The blog wireframes that we created were rather simple, so we incorporated only a few semantic elements to design a foundation that we could later change as we continued to further design more complex wireframes. As the code above exemplifies, we used the <nav> semantic element in order to contain the navigational links for the webpage and nested this inside of the <header> element which typically includes the site name and navigation. I later included <article> element to signify that contained there is a blog entry. Nested inside the <article> are the <hgroup> and <figure> semantic elements which is used to group together headings and figures associated with the article, respectively. Semantic elements are used so that developers can describe the layout of the page which is relevant with regards to screen readers and presummably later styling the content.

	Man, this webpage looks so basic when I load it, but CSS will definitely help with that!
-->
